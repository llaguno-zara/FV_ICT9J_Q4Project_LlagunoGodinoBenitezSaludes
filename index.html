<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Project | Login Form</title>

    <style>
        body{
            background-image: url(https://m.media-amazon.com/images/S/pv-target-images/3b1a86785f5670e575e39c5fc3d4fe551a97c70dad94566f470afa4e521c8d49._SX1080_FMjpg_.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
    
        .container-fluid{
            width: 400px;
            margin: auto;
            background-color: rgb(138, 113, 162);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 15px 5px rgba(0,0,0,0.72)
        }

        #toptext{
            display: block;
            width: 100%;
        }

        .form-control {
            width: 100%;
            border-radius: 10px;
        }

        img{
            height: 100px;
            width: auto;
        }

        h1, label{
            color: #ffffff;
            font-weight: bold;
        }

        h6{
            color: white;
            background-color: #cc8ab9;
            border-radius: 20px;
            padding: 6px;
            display: block;
            display: inline-block;
            width: auto;
        }

        #checkboxcontainer{
            display: flex;
            justify-content: left; 
            align-items: center;     
            gap: 8px;
        } 

        .footer{
            background-color: #333333c7; 
            color: white;
            font-size: 15px;
            font-style: italic;
            padding: 10px;
            border-radius: 3px;
            position: fixed;
            bottom: 0;         
            right: 0;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <form>
            <img src="https://static.wikia.nocookie.net/logopedia/images/d/d7/My_Little_Pony_%282016%29.svg/revision/latest/scale-to-width-down/250?cb=20180727085836">
            
            <br><br>

            <h1>Login</h1>
                
            <br>

            <label id="toptext"> 
                <h6>Username</h6>
                <input type="text" id="username" class="form-control" placeholder="Enter username here...">
            </label>

            <br>

            <label id="toptext">
                <h6>Password</h6>
                <input type="password" id="pw" class="form-control" placeholder="Enter password here...">
            </label>

            <br>

            <div id="checkboxcontainer">
                <input type="checkbox" id="login" onclick="session()">
                    <label id="checklabel"> Stay logged in</label>
                <br>
                    
                <div id="message"></div>
            </div>

            <br>

            <button type="button" class="btn btn-info" id="logbutton" onclick="checklogin()">Login</button>
            <button type="button" class="btn btn-light" onclick="window.location.reload()">Cancel</button>
        </form>
    </div>

    <div class="footer">
        Benitez, Godino, Llaguno, Saludes | 9-Jade @2026
    </div>

    <script>
        let attempt_counter = 0;
        function checklogin(){
            let inputusername = document.getElementById("username").value;
            let inputpw = document.getElementById("pw").value;

            do {
                    if (inputusername === "applejacklover" && inputpw === "1028") {
                        alert("Your login is successful!");
                        attempt_counter = 0; // reset after success
                        document.getElementById("message").innerHTML = "Access granted, applejacklover!";
                        window.location.href = "dashboard.html"; //go to second page
                        break; // stop loop

                    } else {
                        attempt_counter++;
                        document.getElementById("message").innerHTML =
                            "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
                    }

                } while (false); 
                    if (attempt_counter >= 3) {
                        alert("Too many failed attempts. Access Locked. ");
                        document.getElementById("logbutton").disabled = true; // lock button
                }
        }

        function session() {
            let staylogin = document.getElementById("login").checked 
            let msgpopup = document.getElementById("message")

            switch(staylogin) {
                case true:
                msgpopup.innerHTML = "<i>Your session will stay active on this device.</i>";
                break;

                case false:
                msgpopup.innerHTML = "";
                break;
            }
        }
    </script>
</body>
</html>
